name: Build DxDispatch Native ARM64

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-native-arm64:
    # 1. FIXED: Correctly matching the official GitHub native ARM64 image naming convention
    runs-on: windows-11-arm

    steps:
    - name: Checkout Forked Repository
      uses: actions/checkout@v4
      
    # 1. ADDED: Cache the external dependencies folder
    - name: Cache CMake Dependencies
      id: cache-deps
      uses: actions/cache@v4
      with:
        path: DxDispatch/build/_deps
        # The cache invalidates if you change CMakeLists.txt or every 7 days
        key: ${{ runner.os }}-dxdispatch-deps-${{ hashFiles('DxDispatch/CMakeLists.txt') }}
        restore-keys: |
          ${{ runner.os }}-dxdispatch-deps-

    - name: Configure CMake Natively
      shell: cmd
      run: |
        cd DxDispatch
        mkdir build
        cd build
        # 2. FIXED: Explicitly mapping architecture output to avoid host default fallback errors
        cmake -G "Visual Studio 17 2022" -A ARM64 -DCMAKE_POLICY_VERSION_MINIMUM=3.5 ..


    - name: Build DxDispatch (Release)
      shell: cmd
      run: |
        cd DxDispatch/build
        cmake --build . --config Release

    - name: Upload Native ARM64 Binary
      uses: actions/upload-artifact@v4
      with:
        name: dxdispatch-native-arm64
        # 3. FIXED: Using path wildcards to locate binaries regardless of the generator output folder structure
        path: |
          DxDispatch/build/Release/
        if-no-files-found: error
